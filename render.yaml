services:
  - type: web
    name: skillbarter-api
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTO_CREATE_TABLES
        value: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CORS_ORIGINS
        sync: false
